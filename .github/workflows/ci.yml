# Runs on every push and PR. Nothing here needs a secret, so it works on a fork.
#
# This exists because the repo had no CI at all: 24 lint errors accumulated
# unnoticed, and a stale-vector bug shipped because nothing checked the invariant.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: {}

jobs:
  web:
    name: Web (typecheck · lint · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - run: npm ci
        working-directory: web

      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.app.json
        working-directory: web

      - name: Lint
        run: npx eslint .
        working-directory: web

      - name: Test
        run: npx vitest run
        working-directory: web

      - name: Build
        run: npm run build
        working-directory: web

  functions:
    name: Functions (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22 # must match the Cloud Functions runtime
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - run: npm ci
        working-directory: functions

      - name: Build
        run: npm run build
        working-directory: functions

  data:
    name: Dataset sync (web/ ↔ functions/)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Verify both packages carry the same projects
        run: node script/check-data-sync.mjs
